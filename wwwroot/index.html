<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blazor_Respawn_Shop</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Blazor_Respawn_Shop.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>
<body>

    <div id="app">
        <div style="height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; position: absolute; top: 0; left: 0;">

            <div class="respawn-loader"></div>

            <h2 style="margin: 20px 0 5px 0; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #007bff; text-shadow: 0 0 10px rgba(0,123,255,0.4);">
                Respawn Shop
            </h2>
            <p style="color: #888; font-size: 0.95rem; margin: 0; font-weight: 600; animation: pulseText 1.5s infinite;">
                Iniciando sistema...
            </p>

        </div>

        <style>
            /* Animación del aro giratorio */
            .respawn-loader {
                width: 55px;
                height: 55px;
                border: 4px solid rgba(0, 123, 255, 0.1);
                border-top: 4px solid #007bff;
                border-radius: 50%;
                animation: spin 1s cubic-bezier(0.55, 0.085, 0.68, 0.53) infinite;
                box-shadow: 0 0 15px rgba(0, 123, 255, 0.2);
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }

            /* Animación de latido para el texto */
            @keyframes pulseText {
                0%, 100% {
                    opacity: 0.5;
                }

                50% {
                    opacity: 1;
                }
            }
        </style>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
